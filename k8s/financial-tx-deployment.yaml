apiVersion: apps/v1
kind: Deployment
metadata:
  name: financial-tx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: financial-tx
  template:
    metadata:
      labels:
        app: financial-tx
    spec:
      containers:
        - name: app
          image: fin-serv:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: DB_HOST
              value: "host.docker.internal"
            - name: DB_PORT
              value: "3306"
            # 同時給兩個名稱，確保 Spring 一定吃得到
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:29092"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "host.docker.internal:29092"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      terminationGracePeriodSeconds: 30