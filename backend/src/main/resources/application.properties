# ==========================================
# MySQL Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/sa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:pa}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
# ==========================================
# Monitoring & Health Checks (Actuator)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
# ==========================================
# Kafka Configuration
# ==========================================
# Base Bootstrap Servers:
# Defaults to localhost:9092 for local development.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer Settings:
spring.kafka.producer.bootstrap-servers=${spring.kafka.bootstrap-servers}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
# Consumer Settings:
# Note: Use settlement-group-v2 to trigger a new rebalance for the multi-thread version
spring.kafka.consumer.group-id=financial-group1
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.partition.assignment.strategy=org.apache.kafka.clients.consumer.RoundRobinAssignor
spring.kafka.consumer.properties.session.timeout.ms=10000
spring.kafka.consumer.properties.heartbeat.interval.ms=3000
# Kafka Listener Settings:
# manual_immediate: Acknowledge the offset as soon as ack.acknowledge() is called.
spring.kafka.listener.ack-mode=manual_immediate
# Concurrency: Number of threads per Pod (should be <= total partitions).
spring.kafka.listener.concurrency=1
# Throughput control: Maximum records per poll.
spring.kafka.consumer.max-poll-records=1
# ==========================================
# Kubernetes & Application Logic Tracking
# ==========================================
# Captures the HOSTNAME environment variable injected by K8s.
app.pod.name=${HOSTNAME:local-dev}
# Feature Toggles:
feature.old-consumer.enabled=false


# ==========================================
# MongoDB Configuration (Sharded Cluster)
# ==========================================
# Connection URI for MongoDB Sharded Cluster.
# In K8s, MONGODB_HOST should point to the 'mongos' service name.
# Defaulting to localhost:27017 for local Docker development.
spring.data.mongodb.uri=mongodb://${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/batch_db

# Optional: Connection Pool Settings for high-concurrency (2TB data processing)
# Maximum number of connections allowed in the pool.
spring.data.mongodb.min-connection-per-host=5
spring.data.mongodb.max-connection-per-host=100

app.batch.size=${BATCH_SIZE:10}
