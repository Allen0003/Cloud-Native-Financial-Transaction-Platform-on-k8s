# ==========================================
# MySQL Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/sa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:pa}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never

# ==========================================
# Monitoring & Health Checks (Actuator)
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

# ==========================================
# Kafka Configuration
# ==========================================
# Base Bootstrap Servers:
# Defaults to localhost:9092 for local development.
# Set KAFKA_HOST=kafka in Docker/K8s to connect via internal network.
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}

# Producer Settings:
# Ensures the Producer uses the same bootstrap servers defined above.
spring.kafka.producer.bootstrap-servers=${spring.kafka.bootstrap-servers}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer Settings:
spring.kafka.consumer.group-id=settlement-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# ==========================================
# Kubernetes Tracking
# ==========================================
# Captures the HOSTNAME environment variable automatically injected by K8s.
# Falls back to 'local-dev' if the variable is not present.
app.pod.name=${HOSTNAME:local-dev}